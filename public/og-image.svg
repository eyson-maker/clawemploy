<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a"/>
      <stop offset="50%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16162a"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0"/>
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Glow effects -->
  <circle cx="900" cy="100" r="300" fill="url(#glow1)"/>
  <circle cx="200" cy="530" r="200" fill="url(#glow2)"/>
  
  <!-- Logo -->
  <text x="600" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" text-anchor="middle" letter-spacing="-2">
    <tspan fill="#6366f1">Claw</tspan><tspan fill="#ffffff">Employ</tspan>
  </text>
  
  <!-- Tagline -->
  <text x="600" y="350" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="500" text-anchor="middle" fill="rgba(255,255,255,0.8)">
    雇佣 AI 专家，而非员工
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="400" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="400" text-anchor="middle" fill="rgba(255,255,255,0.5)">
    预配置 AI Agent 服务，为独立开发者和超级个体打造
  </text>
  
  <!-- Agent badges -->
  <g transform="translate(600, 480)" text-anchor="middle">
    <rect x="-280" y="0" width="80" height="32" rx="16" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.3)"/>
    <text x="-240" y="22" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="rgba(255,255,255,0.7)">调研</text>
    
    <rect x="-180" y="0" width="80" height="32" rx="16" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.3)"/>
    <text x="-140" y="22" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="rgba(255,255,255,0.7)">SEO</text>
    
    <rect x="-80" y="0" width="80" height="32" rx="16" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.3)"/>
    <text x="-40" y="22" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="rgba(255,255,255,0.7)">测试</text>
    
    <rect x="20" y="0" width="80" height="32" rx="16" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.3)"/>
    <text x="60" y="22" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="rgba(255,255,255,0.7)">运维</text>
    
    <rect x="120" y="0" width="80" height="32" rx="16" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.3)"/>
    <text x="160" y="22" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="rgba(255,255,255,0.7)">内容</text>
    
    <rect x="220" y="0" width="80" height="32" rx="16" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.3)"/>
    <text x="260" y="22" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="rgba(255,255,255,0.7)">管理</text>
  </g>
</svg>
